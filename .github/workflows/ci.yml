name: CI

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main, preview]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test --configuration Release --no-build --logger trx --results-directory ./test-results

      - name: Install Pester
        shell: pwsh
        run: |
          $Existing = Get-Module -Name Pester -ListAvailable | Where-Object { $_.Version.Major -ge 5 } | Select-Object -First 1
          if (-not $Existing) {
              Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -SkipPublisherCheck
          }

      - name: System Tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/Invoke-SystemTests.ps1 -Configuration Release -NoBuild

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./test-results/
          retention-days: 14

      - name: Upload Module Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: PowerCode.Git-module
          path: artifacts/module/PowerCode.Git/
          retention-days: 14
